                  value:
                    id: PAYZU20250817215911F49RDOBJ
                    status: PENDING
                    amount: 10
                    type: DEPOSIT
                    qrCodeText: 00020126870014br.gov.bcb.pix2565qrcode.payzu.com.br/dynamic/d7790b91-3979-4ad5-9d96-ee941e5a42765204000053039865802BR5908PAYZUPLUS6009SAO
                      PAULO62070503***63047EE4
                    qrCodeBase64: iVBORw0KGgoAAAANSUhEUgAAAZAAAAGQCAYAAAC...
                    qrCodeUrl: https://pix.payzu.com.br/v1/pix/qr-code/PAYZU20250817215911F49RDOBJ
                    generatedName: John Doe
                    generatedDocument: "12345678901"
                    generatedEmail: john.doe@example.com
                    serviceFeeCharged: 0.115
                    payerName: null
                    payerDocument: null
                    payerInstitutionIspb: null
                    payerInstitutionName: null
                    payerAccountNumber: null
                    receiverName: null
                    receiverDocument: null
                    receiverInstitutionIspb: null
                    receiverInstitutionName: null
                    receiverAccountNumber: "513579"
                    endToEndId: null
                    createdAt: 2025-08-17T21:59:11.579Z
                    updatedAt: 2025-08-17T21:59:11.579Z
                    paidAt: null
                    withdrawPixKey: null
                    withdrawPixType: null
                    clientReference: order_12345
                    refundEndToEndId: null
                    refundAmount: null
                    refundStatus: null
                    refundReason: null
                    refundDescription: null
                    refundedAt: null
                    cancellationReason: null
              schema:
                $ref: "#/components/schemas/Transaction"
          description: Charge created
        "400":
          content:
            application/json:
              examples:
                error:
                  value:
                    statusCode: 400
                    error: Bad Request
                    message: "querystring/dateFrom Invalid input: expected string,\
                      \ received undefined"
                    requestId: cmou00000abcdef01s6ghij1k2lm
              schema:
                $ref: "#/components/schemas/ApiError"
          description: "Bad Request, payload or query string failed validation"
        "401":
