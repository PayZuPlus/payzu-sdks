          content:
            application/json:
              examples:
                error:
                  value:
                    statusCode: 400
                    error: Bad Request
                    message: "querystring/dateFrom Invalid input: expected string,\
                      \ received undefined"
                    requestId: cmou00000abcdef01s6ghij1k2lm
              schema:
                $ref: "#/components/schemas/ApiError"
          description: "Bad Request, payload or query string failed validation"
        "401":
          content:
            application/json:
              examples:
                error:
                  value:
                    statusCode: 401
                    error: Unauthorized
