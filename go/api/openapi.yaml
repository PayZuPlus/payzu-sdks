        "404":
          content:
            application/json:
              examples:
                error:
                  value:
                    statusCode: 404
                    error: Not Found
                    message: Resource not found
                    requestId: cmou00000abcdef01s6ghij1k2lm
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Resource not found
      security:
      - BearerAuth: []
      summary: Retrieve Charge
      tags:
      - Pix Operations
    post:
      description: Create a new Pix **deposit** (charge). Returns QR Code and transaction
        details.
      operationId: post_pix
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
