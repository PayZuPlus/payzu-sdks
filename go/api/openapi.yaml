openapi: 3.1.0
info:
  contact:
    name: Suporte PayZu
    url: https://suporte.payzu.com.br
  description: |
    REST API for Pix operations on the PayZu platform, deposits, withdrawals, internal transfers, infractions, reports, and callback inspection. All amounts are in BRL (reais) unless explicitly noted. Authentication uses a Bearer token issued during onboarding.

    ## SDKs oficiais

    - Node.js: `npm install payzu-pix`
    - Python: `pip install payzu-pix`
    - Go: `go get github.com/PayZuPlus/payzu-sdks/go`
    - PHP: `composer require payzu/pix`

    Repo: https://github.com/PayZuPlus/payzu-sdks
  title: PayZu Pix API
  version: 1.7.0
externalDocs:
  description: Complete documentation
  url: https://docs.payzu.com.br/docs/pix-processamento
servers:
- description: Production
  url: https://api.payzu.processamento.com/v1
tags:
- description: Create and manage Pix charges (deposits)
  name: Pix Operations
- description: Send money via Pix (cash out) and DICT key/QR-code consultation
  name: Withdrawals
- description: "Transfer funds between PayZu accounts (free, instant)"
  name: Internal Transfer
- description: "Account profile, balance, and auto-withdraw configuration"
  name: Account
- description: "Transaction history, reports, bank statements, and pending deposits"
  name: Reports
- description: Webhook callback inspection and re-trigger
  name: Callbacks
- description: "Manage Pix infractions (disputes, fraud reports) and submit defenses"
  name: Infractions
paths:
  /pix:
    get:
      description: "Get the latest status and details for a Pix **deposit (charge)**.\
        \ Provide **one** of `id`, `clientReference`, or `endToEndId`. Combining more\
        \ than one returns an error."
      operationId: get_pix
      parameters:
      - description: Transaction ID.
        example: PAYZU20250817215911F49RDOBJ
        explode: true
        in: query
        name: id
        required: false
        schema:
          type: string
        style: form
      - description: External reference provided when creating the charge.
        explode: true
        in: query
        name: clientReference
        required: false
        schema:
          type: string
        style: form
      - description: Pix end-to-end ID.
        explode: true
        in: query
        name: endToEndId
        required: false
        schema:
          type: string
        style: form
      - description: Virtual sub-account (up to 50 characters) used at creation. Accepted
          as an alternative lookup key.
        explode: true
        in: query
        name: virtualAccount
        required: false
        schema:
          maxLength: 50
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                pending:
                  summary: Pending payment
                  value:
                    id: PAYZU20250817215911F49RDOBJ
                    status: PENDING
                    amount: 10
                    type: DEPOSIT
                    qrCodeText: 00020126870014br.gov.bcb.pix2565qrcode.payzu.com.br/dynamic/d7790b91-3979-4ad5-9d96-ee941e5a42765204000053039865802BR5908PAYZUPLUS6009SAO
                      PAULO62070503***63047EE4
                    qrCodeBase64: iVBORw0KGgoAAAANSUhEUgAAAZAAAAGQCAYAAAC...
                    qrCodeUrl: https://pix.payzu.com.br/v1/pix/qr-code/PAYZU20250817215911F49RDOBJ
                    generatedName: John Doe
                    generatedDocument: "12345678901"
                    generatedEmail: john.doe@example.com
                    serviceFeeCharged: 0.115
                    payerName: null
                    payerDocument: null
                    payerInstitutionIspb: null
                    payerInstitutionName: null
                    payerAccountNumber: null
                    receiverName: null
                    receiverDocument: null
                    receiverInstitutionIspb: null
                    receiverInstitutionName: null
                    receiverAccountNumber: "513579"
                    endToEndId: null
                    createdAt: 2025-08-17T21:59:11.579Z
                    updatedAt: 2025-08-17T21:59:11.579Z
                    paidAt: null
                    withdrawPixKey: null
                    withdrawPixType: null
                    clientReference: order_12345
                    refundEndToEndId: null
                    refundAmount: null
                    refundStatus: null
                    refundReason: null
                    refundDescription: null
                    refundedAt: null
                    cancellationReason: null
                completed:
                  summary: Completed payment
                  value:
                    id: PAYZU20250817215911F49RDOBJ
                    status: COMPLETED
                    amount: 10
                    type: DEPOSIT
                    qrCodeText: null
                    qrCodeBase64: null
                    qrCodeUrl: null
                    generatedName: John Doe
                    generatedDocument: "12345678901"
                    generatedEmail: john.doe@example.com
                    serviceFeeCharged: 0.115
                    payerName: John Doe
                    payerDocument: "12345678901"
                    payerInstitutionIspb: "12345678"
                    payerInstitutionName: Banco X
                    payerAccountNumber: null
                    receiverName: PayZu Pagamentos Ltda
                    receiverDocument: 12.345.678/0001-00
                    receiverInstitutionIspb: "23066240"
                    receiverInstitutionName: PAYZU IP LTDA.
                    receiverAccountNumber: "513579"
                    endToEndId: E123456782025081422403B13DMS72H9
                    createdAt: 2025-08-17T21:59:11.579Z
                    updatedAt: 2025-08-17T22:01:30.123Z
                    paidAt: 2025-08-17T22:01:30.123Z
                    withdrawPixKey: null
                    withdrawPixType: null
                    clientReference: order_12345
                    refundEndToEndId: null
                    refundAmount: null
                    refundStatus: null
                    refundReason: null
                    refundDescription: null
                    refundedAt: null
                    cancellationReason: null
              schema:
                $ref: "#/components/schemas/Transaction"
          description: Current transaction state
