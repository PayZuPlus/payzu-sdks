  /pix/key:
    get:
      description: Query the DICT (Diretório de Identificadores de Contas Transacionais)
        to retrieve information about a Pix key before sending a payment. Returns
        the key owner's details and associated financial institution.
      operationId: get_pix_key
      parameters:
      - description: "The Pix key to lookup (CPF, CNPJ, email, phone, or EVP)."
        example: example@payzu.com.br
        explode: true
        in: query
        name: pixKey
        required: true
        schema:
          maxLength: 77
          minLength: 1
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                pj:
                  summary: Legal Entity (PJ)
                  value:
                    pixKey: 5c8999e2-6b29-468b-b4e9-04d4872b1bc4
                    document: '**.345.678/****-**'
                    name: EMPRESA EXEMPLO LTDA
                    branch: '****'
                    accountNumber: '*******'
                    personType: PJ
                    accountType: CACC
                    institutionIspb: "12345678"
                    institutionCode: "001"
                    institutionName: BANCO EXEMPLO S.A.
                pf:
                  summary: Individual (PF)
                  value:
                    pixKey: "12345678901"
                    document: '***.456.789-**'
                    name: João da Silva
                    branch: '****'
                    accountNumber: '********'
                    personType: PF
                    accountType: TRAN
                    institutionIspb: "87654321"
                    institutionCode: "260"
                    institutionName: BANCO FICTICIO S.A.
              schema:
                $ref: "#/components/schemas/PixKeyInfo"
          description: Pix key information retrieved successfully
        "400":
          content:
            application/json:
              examples:
                error:
                  value:
                    statusCode: 400
                    error: Bad Request
                    message: "querystring/dateFrom Invalid input: expected string,\
                      \ received undefined"
                    requestId: cmou00000abcdef01s6ghij1k2lm
              schema:
                $ref: "#/components/schemas/get_pix_key_400_response"
          description: Invalid Pix key format
        "404":
          content:
            application/json:
              examples:
                error:
                  value:
                    statusCode: 404
                    error: Not Found
                    message: Resource not found
                    requestId: cmou00000abcdef01s6ghij1k2lm
              schema:
                $ref: "#/components/schemas/get_pix_key_404_response"
          description: Pix key not found in DICT
      security:
      - BearerAuth: []
      summary: Dict Pix Key Lookup
      tags:
      - Withdrawals
  /pix/qrcode/read:
    post:
      description: "Decode and extract information from a Pix QR Code (EMV format)\
        \ before making a payment. Returns the parsed data including receiver details,\
        \ amount (if present), and other QR Code metadata. Currently PayZu only supports\
        \ dynamic QR Codes. Static QR Codes are not processed yet."
      operationId: post_pix_qrcode_read
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostPixQrcodeReadRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                dynamic:
                  summary: Dynamic QR Code
                  value:
                    qrCodeType: DYNAMIC
                    name: LOJA EXEMPLO LTDA
                    document: "12345678000199"
                    amount: 10
                    originalAmount: 10
                    txid: c5886b83f0254d0dbfc3900f72d5a8d1
                    additionalInfo: null
                    expiresIn: 1799
                    createdAt: 2026-02-03T22:59:36.138
                static:
                  summary: Static QR Code
                  value:
                    qrCodeType: STATIC
                    name: MARIA SANTOS
                    document: "98765432100"
                    amount: 1
                    originalAmount: 1
                    txid: QRTEST20251103083119867
                    additionalInfo: null
                    expiresIn: 0
                    createdAt: null
              schema:
                $ref: "#/components/schemas/QRCodeReadResponse"
          description: QR Code decoded successfully
        "400":
          content:
            application/json:
              examples:
                error:
                  value:
                    statusCode: 400
                    error: Bad Request
                    message: "querystring/dateFrom Invalid input: expected string,\
                      \ received undefined"
                    requestId: cmou00000abcdef01s6ghij1k2lm
              schema:
                $ref: "#/components/schemas/post_pix_qrcode_read_400_response"
          description: Invalid QR Code format
      security:
      - BearerAuth: []
      summary: Read QR Code
      tags:
      - Withdrawals
  /proof/{id}:
    get:
      description: Returns the transaction receipt as JSON with a `base64` field (encoded
        PDF). Decode it to display or save as `.pdf`.
      operationId: get_proof
      parameters:
      - description: Transaction ID.
        example: PAYZU2025081418333632CYKN8M
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: Return format.
        example: pdf
        explode: true
        in: query
        name: type
        required: false
        schema:
          default: pdf
          enum:
          - pdf
          - base64
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                base64:
                  summary: As Base64
                  value:
                    base64: JVBERi0xLjQKJ...
              schema:
                $ref: "#/components/schemas/ProofResponse"
            application/pdf:
              schema:
                description: "Binary PDF (default format, when `type=pdf`)."
                format: binary
                type: string
          description: "Base64 if `type=base64`, otherwise binary PDF."
        "400":
          content:
            application/json:
              examples:
                error:
                  value:
                    statusCode: 400
                    error: Bad Request
                    message: querystring/type Invalid input
                    requestId: cmou00000abcdef01s6ghij1k2lm
              schema:
                $ref: "#/components/schemas/ApiError"
          description: "Bad Request, payload or query string failed validation"
        "401":
          content:
            application/json:
              examples:
                error:
                  value:
                    statusCode: 401
                    error: Unauthorized
                    message: Missing or invalid Bearer token
                    requestId: cmou00000abcdef01s6ghij1k2lm
              schema:
                $ref: "#/components/schemas/ApiError"
          description: "Unauthorized, missing or invalid Bearer token, or token lacks\
            \ the required permission for this endpoint"
        "404":
          content:
            application/json:
              examples:
                error:
                  value:
                    statusCode: 404
                    error: Not Found
                    message: Resource not found
                    requestId: cmou00000abcdef01s6ghij1k2lm
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Resource not found
      security:
      - BearerAuth: []
      summary: Get Transaction Receipt
      tags:
      - Pix Operations
  /withdraw:
    get:
      description: "Get the latest status and details for a withdrawal. Provide at\
        \ least one of `id`, `clientReference`, or `endToEndId`. If more than one\
        \ is provided, all are applied as filters (AND), which may return no record\
        \ if they do not point to the same transaction."
