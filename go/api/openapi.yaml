  /user/callbacks/resend:
    post:
      description: Resend callbacks in bulk for transactions matching the given filters.
      operationId: resend_user_callbacks
      parameters: []
      requestBody:
        content:
          application/json:
            examples:
              by_period:
                summary: Resend everything paid in the last day
                value:
                  createdAtFrom: 2026-05-05T00:00:00Z
                  createdAtTo: 2026-05-06T00:00:00Z
              filtered:
                summary: Only completed deposits in a 7-day window
                value:
                  createdAtFrom: 2026-04-29T00:00:00Z
                  createdAtTo: 2026-05-06T00:00:00Z
                  transactionTypes:
                  - DEPOSIT
                  transactionStatus:
                  - COMPLETED
            schema:
              $ref: "#/components/schemas/ResendUserCallbacksRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                ok:
                  value:
                    message: Callbacks reenviados com sucesso
                    total: 42
              schema:
                $ref: "#/components/schemas/resend_user_callbacks_200_response"
          description: Resend dispatched
        "404":
          content:
            application/json:
              examples:
                error:
                  value:
                    statusCode: 404
                    error: Not Found
                    message: Resource not found
                    requestId: cmou00000abcdef01s6ghij1k2lm
              schema:
                $ref: "#/components/schemas/ApiError"
          description: No matching transactions
        "429":
          content:
            application/json:
              examples:
                error:
                  value:
                    statusCode: 429
                    error: Too Many Requests
                    message: Limite de reenvios atingido. Tente novamente em 1 minuto.
                    requestId: cmou00000abcdef01s6ghij1k2lm
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Rate limit exceeded (5/min)
      security:
      - BearerAuth: []
      summary: Re-send callbacks (bulk)
      tags:
      - Callbacks
  /user/callbacks/resend/{transactionId}:
    post:
      description: Resend the callback of a single transaction.
      operationId: resend_user_callback_single
      parameters:
      - explode: false
        in: path
        name: transactionId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              examples:
                ok:
                  value:
                    message: Callback reenviado com sucesso
              schema:
                $ref: "#/components/schemas/resend_user_callback_single_200_response"
          description: Resend dispatched
        "404":
          content:
            application/json:
              examples:
                error:
                  value:
                    statusCode: 404
                    error: Not Found
                    message: Resource not found
                    requestId: cmou00000abcdef01s6ghij1k2lm
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Transaction not found or has no callbackUrl configured
        "429":
          content:
            application/json:
              examples:
                error:
                  value:
                    statusCode: 429
                    error: Too Many Requests
                    message: Limite de reenvios atingido. Tente novamente em 1 minuto.
                    requestId: cmou00000abcdef01s6ghij1k2lm
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Rate limit exceeded (5/min)
      security:
      - BearerAuth: []
      summary: Re-send callback (single)
      tags:
      - Callbacks
  /pix/qr-code/{transactionId}:
    get:
      description: Render the Pix QR Code of a deposit as a binary PNG image
      operationId: get_pix_qrcode
      parameters:
      - explode: false
        in: path
        name: transactionId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            image/png:
              schema:
                format: binary
                type: string
          description: QR code image
        "400":
          content:
            application/json:
              examples:
                error:
                  value:
                    statusCode: 400
                    error: Bad Request
                    message: "querystring/dateFrom Invalid input: expected string,\
                      \ received undefined"
                    requestId: cmou00000abcdef01s6ghij1k2lm
              schema:
                $ref: "#/components/schemas/ApiError"
          description: Transaction is not a DEPOSIT or has no QR code
        "404":
          content:
            application/json:
              examples:
                error:
                  value:
                    statusCode: 404
                    error: Not Found
                    message: Resource not found
                    requestId: cmou00000abcdef01s6ghij1k2lm
              schema:
                $ref: "#/components/schemas/get_pix_qrcode_404_response"
          description: Transaction not found
      security:
      - BearerAuth: []
      summary: Render Pix QR code (PNG)
      tags:
      - Pix Operations
