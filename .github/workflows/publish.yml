name: Publish SDKs

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão (ex: 0.1.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  npm:
    runs-on: ubuntu-latest
    if: ${{ vars.NPM_PUBLISH == 'true' || github.event_name == 'release' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Build
        working-directory: nodejs
        env:
          RELEASE_VERSION: ${{ inputs.version || github.event.release.tag_name }}
        run: |
          npm version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version
          npm ci
          npm run build
          npm test
      - name: Publish
        working-directory: nodejs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "payzu-pix@$LOCAL" version 2>/dev/null || true)
          if [ -n "$PUBLISHED" ]; then
            echo "payzu-pix@$LOCAL ja publicado, pulando"
          else
            npm publish
          fi

  pypi:
    runs-on: ubuntu-latest
    if: ${{ vars.PYPI_PUBLISH == 'true' || github.event_name == 'release' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build
        working-directory: python
        env:
          RELEASE_VERSION: ${{ inputs.version || github.event.release.tag_name }}
        run: |
          python -m pip install --upgrade build twine
          sed -i "s/^VERSION = .*/VERSION = \"$RELEASE_VERSION\"/" setup.py
          sed -i "s/^version = .*/version = \"$RELEASE_VERSION\"/" pyproject.toml
          python -m build
      - name: Publish
        working-directory: python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload --skip-existing dist/*

  packagist:
    runs-on: ubuntu-latest
    if: ${{ vars.PACKAGIST_PUBLISH == 'true' }}
    steps:
      - name: Trigger Packagist update
        env:
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
        run: |
          curl -sf -XPOST -H "content-type:application/json" \
            "https://packagist.org/api/update-package?username=payzu&apiToken=${PACKAGIST_TOKEN}" \
            -d '{"repository":{"url":"https://github.com/PayZuPlus/payzu-sdks"}}'
